<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aliad — artist aliases & side projects</title>
    <meta
      name="description"
      content="Map every alias. Find all acts playing more than once in a festival lineup."
    />
    <link rel="canonical" href="https://aliad.app/" />
    <meta name="theme-color" content="#070a17" />

    <!-- Icons (served from public/ → dist root). SVG for modern browsers, .ico
         so bare /favicon.ico probes don't 404, apple-touch for iOS home screens. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / Twitter. Shared links are #l=… fragments the scrapers never
         see, so every share previews this one static branded card by design. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="aliad" />
    <meta property="og:title" content="aliad — artist aliases & side projects" />
    <meta
      property="og:description"
      content="Map every alias. Find all acts playing more than once in a festival lineup."
    />
    <meta property="og:url" content="https://aliad.app/" />
    <meta property="og:image" content="https://aliad.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="aliad — map every alias, find all acts playing more than once in a festival lineup."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="aliad — artist aliases & side projects" />
    <meta
      name="twitter:description"
      content="Map every alias. Find all acts playing more than once in a festival lineup."
    />
    <meta name="twitter:image" content="https://aliad.app/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
