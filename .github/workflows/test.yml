name: test

on:
  push:
  pull_request:

# A newer push to the same branch supersedes the queued/running check;
# main keeps every run (deploy history should stay complete).
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - run: npm run build
